<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed! — FreshBite</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body>

  <div id="navbar-container"></div>

  <main class="checkout-success" id="checkout-success">
    <div class="success-card">

      <div class="success-icon">🎉</div>
      <h2>Order Placed Successfully!</h2>
      <p>Your delicious food is being prepared.<br>Estimated delivery: <strong id="delivery-eta">—</strong></p>

      <div class="order-id-tag">
        📦 Order ID: <span id="order-id-display">—</span>
      </div>

      <!-- Tracker -->
      <div class="order-tracker">
        <div class="tracker-step done">
          <div class="step-circle">✓</div>
          <div class="step-text">
            <div class="step-title">Order Confirmed</div>
            <div class="step-time" id="t-confirmed">Just now</div>
          </div>
        </div>
        <div class="tracker-step current">
          <div class="step-circle">🍳</div>
          <div class="step-text">
            <div class="step-title">Restaurant is preparing your food</div>
            <div class="step-time">In progress…</div>
          </div>
        </div>
        <div class="tracker-step">
          <div class="step-circle">🛵</div>
          <div class="step-text">
            <div class="step-title">Out for delivery</div>
            <div class="step-time">Pending</div>
          </div>
        </div>
        <div class="tracker-step">
          <div class="step-circle">✅</div>
          <div class="step-text">
            <div class="step-title">Delivered to your door</div>
            <div class="step-time">Pending</div>
          </div>
        </div>
      </div>

      <!-- Order Details -->
      <div style="background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;text-align:left">
        <div style="font-size:13px;font-weight:700;color:var(--dark);margin-bottom:10px">📋 Order Details</div>
        <div id="items-display"></div>
        <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-weight:800;color:var(--orange)">
          <span>Total Paid</span><span id="order-total-display">—</span>
        </div>
      </div>

      <!-- Address -->
      <div style="background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px;text-align:left;font-size:13px;color:var(--muted);line-height:1.6">
        <strong style="color:var(--dark);display:block;margin-bottom:6px">📍 Delivering to</strong>
        <div id="addr-display">—</div>
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" style="flex:1;justify-content:center;border-radius:var(--radius-sm)" onclick="window.location.href='orders.html'">
          📦 Track Order
        </button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center;border-radius:var(--radius-sm);color:var(--text);border-color:var(--border)" onclick="window.location.href='../index.html'">
          🍽️ Order More
        </button>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const now = new Date();
      document.getElementById("t-confirmed").textContent =
        now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
    });
  </script>
</body>
</html>
