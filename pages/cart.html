<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — FreshBite</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body>

  <div id="navbar-container"></div>

  <main class="cart-page">
    <div class="container">
      <h1>Your Cart 🛒 <span id="cart-count-heading"></span></h1>
      <div class="cart-grid">
        <div id="cart-items-wrap">
          <!-- Injected by cart.js -->
        </div>
        <div id="cart-summary-wrap">
          <!-- Injected by cart.js -->
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    // Guard: must be logged in
    document.addEventListener("DOMContentLoaded", () => {
      if (!STATE.user) {
        showToast("Please login to view your cart", "error");
        setTimeout(() => window.location.href = "login.html", 800);
        return;
      }
      const h = document.getElementById("cart-count-heading");
      if (h && STATE.cart.length) h.textContent = `(${cartCount()} items)`;
    });
  </script>
</body>
</html>
