<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — FreshBite</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <style>
    .orders-page { padding: 36px 0 60px; min-height: calc(100vh - 64px); }
    .orders-page h1 { font-size: 26px; font-weight: 900; color: var(--dark); margin-bottom: 28px; }
    .order-card { background:#fff; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:20px; overflow:hidden; }
    .order-card-head { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:var(--bg); }
    .order-num { font-size:14px; font-weight:800; color:var(--dark); }
    .order-date { font-size:12px; color:var(--muted); margin-top:2px; }
    .order-status-badge { padding:4px 12px; border-radius:10px; font-size:12px; font-weight:700; }
    .status-confirmed { background:#E8FFF2; color:var(--green); }
    .status-delivered  { background:#EEF1F8; color:var(--muted); }
    .status-cancelled  { background:#FFEEEE; color:var(--red); }
    .order-items { padding:16px 20px; }
    .order-item-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
    .order-item-row:last-child { border-bottom:none; }
    .oi-img { width:52px; height:52px; border-radius:8px; object-fit:cover; flex-shrink:0; }
    .oi-name { flex:1; font-size:14px; font-weight:600; color:var(--dark); }
    .oi-qty  { font-size:13px; color:var(--muted); }
    .oi-price{ font-size:14px; font-weight:800; color:var(--orange); }
    .order-card-foot { padding:14px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .reorder-btn { background:var(--orange); color:#fff; border:none; padding:9px 20px; border-radius:25px; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .reorder-btn:hover { background:var(--orange-d); }
    .no-orders { text-align:center; padding:80px 20px; }
    .no-orders h3 { font-size:20px; font-weight:800; color:var(--dark); margin-bottom:8px; }
    .no-orders p { color:var(--muted); margin-bottom:24px; }
  </style>
</head>
<body>

  <div id="navbar-container"></div>

  <main class="orders-page">
    <div class="container">
      <h1>📦 My Orders</h1>
      <div id="orders-wrap">
        <!-- Injected by script below -->
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!STATE.user) {
        showToast("Please login to view orders", "error");
        setTimeout(() => window.location.href = "login.html", 800);
        return;
      }
      renderOrders();
    });

    function renderOrders() {
      const orders = JSON.parse(localStorage.getItem("fb_orders") || "[]");
      const wrap   = document.getElementById("orders-wrap");

      if (!orders.length) {
        wrap.innerHTML = `
          <div class="no-orders">
            <div style="font-size:72px;margin-bottom:16px">📦</div>
            <h3>No orders yet!</h3>
            <p>Looks like you haven't ordered anything yet.<br>Explore our delicious menu!</p>
            <button class="btn btn-primary" onclick="window.location.href='../index.html'">Browse Menu 🍽️</button>
          </div>`;
        return;
      }

      wrap.innerHTML = orders.map(order => {
        const date     = new Date(order.placedAt).toLocaleString("en-IN", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
        const statuses = { confirmed:"Order Confirmed", delivered:"Delivered", cancelled:"Cancelled" };
        const statCls  = { confirmed:"status-confirmed", delivered:"status-delivered", cancelled:"status-cancelled" };

        return `
        <div class="order-card">
          <div class="order-card-head">
            <div>
              <div class="order-num">Order #${order.id}</div>
              <div class="order-date">${date}</div>
            </div>
            <span class="order-status-badge ${statCls[order.status]||'status-confirmed'}">
              ${statuses[order.status]||'Confirmed'}
            </span>
          </div>
          <div class="order-items">
            ${order.items.map(item => {
              const food = FOODS.find(f => f.id === item.id);
              return `
              <div class="order-item-row">
                <img class="oi-img" src="${item.img}" alt="${item.name}" loading="lazy" />
                <div class="oi-name">${item.name}</div>
                <div class="oi-qty">× ${item.qty}</div>
                <div class="oi-price">₹${item.price * item.qty}</div>
              </div>`;
            }).join("")}
          </div>
          <div class="order-card-foot">
            <div>
              <span style="font-size:13px;color:var(--muted)">Total: </span>
              <span style="font-size:16px;font-weight:800;color:var(--orange)">₹${order.total}</span>
              <span style="font-size:12px;color:var(--muted);margin-left:10px">via ${order.payment?.toUpperCase()||'COD'}</span>
            </div>
            <button class="reorder-btn" onclick="reorder(${JSON.stringify(order.id)})">🔄 Reorder</button>
          </div>
        </div>`;
      }).join("");
    }

    function reorder(orderId) {
      const orders = JSON.parse(localStorage.getItem("fb_orders") || "[]");
      const order  = orders.find(o => o.id === orderId);
      if (!order) return;
      order.items.forEach(item => addToCart(item.id, item.qty));
      showToast("Items added to cart! 🛒", "success");
      setTimeout(() => window.location.href = "cart.html", 800);
    }
  </script>
</body>
</html>
