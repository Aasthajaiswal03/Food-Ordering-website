<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — FreshBite</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <style>
    .profile-page { padding:40px 0 60px; min-height:calc(100vh - 64px); }
    .profile-grid { display:grid; grid-template-columns:280px 1fr; gap:24px; align-items:start; }
    .profile-card { background:#fff; border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; }
    .profile-hero-card {
      background: linear-gradient(135deg, var(--nav), #0F3460);
      padding: 36px 24px;
      text-align: center;
      color: #fff;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; color: #fff;
      margin: 0 auto 14px;
      border: 4px solid rgba(255,255,255,0.2);
    }
    .profile-name  { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .profile-email { font-size: 13px; opacity: 0.7; }
    .profile-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px; font-size: 14px; font-weight: 600;
      color: var(--text); border-bottom: 1px solid var(--border);
      transition: all 0.2s; cursor: pointer;
    }
    .profile-nav a:last-child { border-bottom: none; }
    .profile-nav a:hover { background: var(--bg); color: var(--orange); }
    .profile-nav a.active { background: #FFF5F0; color: var(--orange); border-left: 3px solid var(--orange); }
    .profile-section { background:#fff; border-radius:var(--radius); border:1px solid var(--border); padding:28px; }
    .profile-section h2 { font-size:18px; font-weight:800; color:var(--dark); margin-bottom:22px; padding-bottom:14px; border-bottom:1px solid var(--border); }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
    .stat-box { background:var(--bg); border-radius:var(--radius-sm); padding:18px; text-align:center; }
    .stat-box .sn { font-size:26px; font-weight:900; color:var(--orange); }
    .stat-box .sl { font-size:12px; color:var(--muted); margin-top:4px; }
    @media(max-width:768px) { .profile-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <div id="navbar-container"></div>

  <main class="profile-page">
    <div class="container">
      <div class="profile-grid">

        <div>
          <div class="profile-card">
            <div class="profile-hero-card">
              <div class="profile-avatar" id="prof-avatar">?</div>
              <div class="profile-name"   id="prof-name">—</div>
              <div class="profile-email"  id="prof-email">—</div>
            </div>
            <nav class="profile-nav">
              <a class="active" onclick="showSection('info', this)">👤 My Info</a>
              <a onclick="window.location.href='orders.html'">📦 My Orders</a>
              <a onclick="showSection('addresses', this)">📍 Saved Addresses</a>
              <a onclick="showSection('wishlist', this)">❤️ Wishlist</a>
              <!-- BUG FIX: use navbar.js logout() — no duplicate function -->
              <a onclick="logout()" style="color:var(--red)">🚪 Logout</a>
            </nav>
          </div>
        </div>

        <div id="profile-main"></div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!STATE.user) {
        showToast("Please login to view profile", "error");
        setTimeout(() => window.location.href = "login.html", 800);
        return;
      }
      loadProfile();
      showSection("info", document.querySelector(".profile-nav a"));
    });

    function loadProfile() {
      document.getElementById("prof-avatar").textContent = STATE.user.name.charAt(0).toUpperCase();
      document.getElementById("prof-name").textContent   = STATE.user.name;
      document.getElementById("prof-email").textContent  = STATE.user.email;
    }

    // BUG FIX: accept 'el' param instead of relying on event.target (more reliable)
    function showSection(sec, el) {
      document.querySelectorAll(".profile-nav a").forEach(a => a.classList.remove("active"));
      if (el) el.classList.add("active");

      const main   = document.getElementById("profile-main");
      const orders = JSON.parse(localStorage.getItem("fb_orders") || "[]");

      if (sec === "info") {
        const u = JSON.parse(localStorage.getItem("fb_users") || "[]").find(u => u.email === STATE.user.email) || STATE.user;
        main.innerHTML = `
          <div class="profile-section">
            <h2>My Information</h2>
            <div class="stats-row">
              <div class="stat-box"><div class="sn">${orders.length}</div><div class="sl">Total Orders</div></div>
              <div class="stat-box"><div class="sn">${STATE.wishlist.length}</div><div class="sl">Wishlist Items</div></div>
              <div class="stat-box"><div class="sn">₹${orders.reduce((s,o)=>s+o.total,0)}</div><div class="sl">Total Spent</div></div>
            </div>
            <div class="form-group"><label class="form-label">Full Name</label>
              <input class="form-input" id="edit-name" value="${u.name||''}" /></div>
            <div class="form-group"><label class="form-label">Gmail Address</label>
              <input class="form-input" value="${u.email||''}" readonly style="background:#f5f5f5;cursor:not-allowed" /></div>
            <div class="form-group"><label class="form-label">Mobile Number</label>
              <input class="form-input" id="edit-phone" value="${u.phone||''}" placeholder="10-digit phone" /></div>
            <button class="btn btn-primary" onclick="saveProfile()" style="margin-top:8px">Save Changes</button>
          </div>`;

      } else if (sec === "wishlist") {
        const items = FOODS.filter(f => STATE.wishlist.includes(f.id));
        main.innerHTML = `
          <div class="profile-section">
            <h2>My Wishlist ❤️</h2>
            ${!items.length ? '<p style="color:var(--muted)">Your wishlist is empty. Start exploring!</p>' :
            `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
              ${items.map(f => `
                <div style="background:var(--bg);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)">
                  <img src="${f.img}" alt="${f.name}" style="width:100%;height:120px;object-fit:cover" loading="lazy"/>
                  <div style="padding:10px">
                    <div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:6px">${f.name}</div>
                    <div style="display:flex;justify-content:space-between;align-items:center">
                      <span style="font-size:15px;font-weight:800;color:var(--orange)">₹${f.price}</span>
                      <button onclick="addToCart(${f.id})" style="background:var(--orange);color:#fff;border:none;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer">Add</button>
                    </div>
                  </div>
                </div>`).join("")}
            </div>`}
          </div>`;

      } else if (sec === "addresses") {
        main.innerHTML = `
          <div class="profile-section">
            <h2>Saved Addresses 📍</h2>
            <div style="background:var(--bg);border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px;text-align:center;color:var(--muted)">
              <div style="font-size:36px;margin-bottom:10px">📍</div>
              <div style="font-size:14px">Add addresses while placing an order.<br>They'll appear here for faster checkout.</div>
            </div>
          </div>`;
      }
    }

    function saveProfile() {
      const name  = document.getElementById("edit-name")?.value.trim();
      const phone = document.getElementById("edit-phone")?.value.trim();
      if (!name || name.length < 3) { showToast("Please enter a valid name", "error"); return; }
      const users = JSON.parse(localStorage.getItem("fb_users") || "[]");
      const idx   = users.findIndex(u => u.email === STATE.user.email);
      if (idx >= 0) { users[idx].name = name; users[idx].phone = phone; }
      localStorage.setItem("fb_users", JSON.stringify(users));
      STATE.user.name = name;
      localStorage.setItem("fb_user", JSON.stringify(STATE.user));
      document.getElementById("prof-name").textContent   = name;
      document.getElementById("prof-avatar").textContent = name.charAt(0).toUpperCase();
      showToast("Profile updated! ✅", "success");
    }
  </script>
</body>
</html>
